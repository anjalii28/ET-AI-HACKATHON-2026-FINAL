# Simplified architecture: Chatwoot at root (reverse proxy), Dashboard under /app (reverse proxy), Twenty via iframe (http://localhost:3002)
# Used by Nginx container in docker-compose.yml

events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name localhost;

        # Dashboard under /app (Vite dev server on host)
        # Redirect /app to /app/ to ensure trailing slash
        location = /app {
            return 301 /app/;
        }
        
        location /app/ {
            proxy_pass http://host.docker.internal:5173/app/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Reviews service
        location /reviews/ {
            proxy_pass http://host.docker.internal:3003/reviews/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Chatwoot at root (Rails on chatwoot-rails:3000)
        location / {
            proxy_pass http://chatwoot-rails:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
